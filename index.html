<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アルプラ適性診断🎾✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="start-screen" class="screen active">
            <h1>アルプラ適性診断🎾✨</h1>
            <p>あなたとサークルの相性は…？<br>5つの質問に直感で答えてね！</p>
            <button class="btn start-btn" onclick="startQuiz()">診断スタート 💖</button>
        </div>

        <div id="question-screen" class="screen">
            <p id="question-number" class="q-number">Q1 / 5</p>
            <h2 id="question-text" class="q-text">質問文がここに入ります</h2>
            <div class="button-group">
                <button class="btn yes-btn" onclick="answer(true)">Yes 🙆‍♀️</button>
                <button class="btn no-btn" onclick="answer(false)">No 🙅‍♀️</button>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <h2>あなたの診断結果は…</h2>
            <div class="result-box">
                <p id="result-text" class="result-title">結果がここに入ります</p>
                <img id="result-image" class="result-img" src="" alt="結果イラスト">
                
                <div class="desc-box">
                    <p id="result-desc" class="result-desc">解説文がここに入ります</p>
                </div>
                </div>
            <p class="share-text">結果をスクショしてストーリーに載せよう📸</p>
            
            <div class="cta-area">
                <p>👇新歓の詳細・参加予約はインスタから👇</p>
                <a href="https://www.instagram.com/alphapluss_2026/" target="_blank" class="btn insta-btn">
                    Instagramを見る 🌸
                </a>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
